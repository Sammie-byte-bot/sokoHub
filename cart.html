<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart — SokoHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Graphik:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --orange: #e8600a;
        --orange-hover: #c24d08;
        --orange-light: #fdf0e8;
        --black: #222222;
        --gray-1: #595959;
        --gray-2: #757575;
        --gray-3: #9b9b9b;
        --gray-4: #d7d7d7;
        --gray-5: #f1f1f1;
        --gray-6: #fafafa;
        --white: #ffffff;
        --border: #d7d7d7;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-full: 999px;
        --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.08);
        --shadow-md: 0 2px 16px rgba(0, 0, 0, 0.12);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.16);
        --font:
          "Graphik", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial,
          sans-serif;
        --nav-h: 60px;
        --trans: 0.15s ease;
      }
      body {
        font-family: var(--font);
        color: var(--black);
        background: var(--white);
        -webkit-font-smoothing: antialiased;
      }
      a {
        text-decoration: none;
        color: inherit;
      }

      /* TOPBAR */
      .topbar {
        background: var(--black);
        color: #fff;
        font-size: 12px;
        text-align: center;
        padding: 8px 16px;
        letter-spacing: 0.2px;
      }
      .topbar a {
        color: #fff;
        text-decoration: underline;
      }

      /* NAVBAR */
      .navbar {
        position: sticky;
        top: 0;
        z-index: 900;
        background: var(--white);
        border-bottom: 1px solid var(--border);
      }
      .nav-main {
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 20px;
        height: var(--nav-h);
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .nav-logo {
        font-size: 26px;
        font-weight: 700;
        color: var(--orange);
        letter-spacing: -1px;
        white-space: nowrap;
        flex-shrink: 0;
        font-style: italic;
      }
      .nav-search-wrap {
        flex: 1;
        max-width: 700px;
        display: flex;
        border: 2px solid var(--black);
        border-radius: var(--radius-full);
        overflow: hidden;
        transition:
          border-color var(--trans),
          box-shadow var(--trans);
      }
      .nav-search-wrap:focus-within {
        border-color: var(--orange);
        box-shadow: 0 0 0 3px rgba(232, 96, 10, 0.15);
      }
      .nav-search-input {
        flex: 1;
        border: none;
        outline: none;
        padding: 10px 18px;
        font-size: 14px;
        font-family: var(--font);
        color: var(--black);
        background: transparent;
      }
      .nav-search-input::placeholder {
        color: var(--gray-3);
      }
      .nav-search-btn {
        padding: 0 22px;
        background: var(--orange);
        color: #fff;
        border: none;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        font-family: var(--font);
        transition: background var(--trans);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .nav-search-btn:hover {
        background: var(--orange-hover);
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: auto;
        flex-shrink: 0;
      }
      .nav-link {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 6px 8px;
        color: var(--gray-1);
        font-size: 11px;
        cursor: pointer;
        border-radius: var(--radius-sm);
        transition: color var(--trans);
        white-space: nowrap;
      }
      .nav-link:hover {
        color: var(--orange);
      }
      .nav-link svg {
        width: 22px;
        height: 22px;
      }
      .btn-sell {
        background: var(--orange);
        color: #fff;
        padding: 8px 20px;
        border-radius: var(--radius-full);
        font-size: 13px;
        font-weight: 600;
        font-family: var(--font);
        border: none;
        cursor: pointer;
        transition: background var(--trans);
        white-space: nowrap;
      }
      .btn-sell:hover {
        background: var(--orange-hover);
      }

      @media (max-width: 900px) {
        .nav-main {
          flex-wrap: wrap;
          height: auto;
          padding: 12px 20px;
          justify-content: center;
        }
        .nav-search-wrap {
          width: 100%;
          max-width: none;
          order: 2;
        }
        .nav-links {
          width: 100%;
          justify-content: flex-end;
          flex-wrap: wrap;
          margin-top: 10px;
          gap: 8px;
          order: 3;
        }
        .nav-link {
          min-width: 96px;
          justify-content: center;
        }
        .btn-sell {
          width: 100%;
          text-align: center;
        }
      }

      /* PAGE */
      .page-wrap {
        max-width: 1300px;
        margin: 0 auto;
        padding: 24px 20px 80px;
      }
      .page-title {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 24px;
      }

      /* CART LAYOUT */
      .cart-layout {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 32px;
        align-items: start;
      }
      @media (max-width: 960px) {
        .cart-layout {
          grid-template-columns: 1fr;
        }
      }

      /* SHOP GROUP */
      .shop-group {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        margin-bottom: 20px;
      }
      .shop-group-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 20px;
        background: var(--gray-6);
        border-bottom: 1px solid var(--border);
      }
      .shop-group-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        overflow: hidden;
        flex-shrink: 0;
      }
      .shop-group-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .shop-group-name {
        font-size: 14px;
        font-weight: 700;
      }
      .shop-group-name a {
        color: var(--orange);
      }
      .shop-group-name a:hover {
        text-decoration: underline;
      }

      /* CART ITEM */
      .cart-item {
        display: flex;
        gap: 16px;
        padding: 20px;
        border-bottom: 1px solid var(--gray-5);
      }
      .cart-item:last-child {
        border-bottom: none;
      }
      .cart-item-img {
        width: 100px;
        height: 100px;
        border-radius: var(--radius-md);
        overflow: hidden;
        flex-shrink: 0;
        background: var(--gray-5);
      }
      .cart-item-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease;
      }
      .cart-item:hover .cart-item-img img {
        transform: scale(1.04);
      }
      .cart-item-body {
        flex: 1;
        min-width: 0;
      }
      .cart-item-title {
        font-size: 14px;
        color: var(--black);
        margin-bottom: 4px;
        line-height: 1.4;
        display: -webkit-box;
        hi: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .cart-item-title:hover {
        text-decoration: underline;
        cursor: pointer;
      }
      .cart-item-shop {
        font-size: 12px;
        color: var(--gray-3);
        margin-bottom: 6px;
      }
      .cart-item-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .meta-pill {
        background: var(--gray-5);
        color: var(--gray-1);
        font-size: 11px;
        padding: 3px 8px;
        border-radius: var(--radius-full);
        font-weight: 500;
      }
      .cart-item-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .qty-ctrl {
        display: flex;
        align-items: center;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        overflow: hidden;
      }
      .qty-btn {
        width: 32px;
        height: 32px;
        border: none;
        background: var(--gray-5);
        cursor: pointer;
        font-size: 16px;
        font-family: var(--font);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--trans);
      }
      .qty-btn:hover {
        background: var(--gray-4);
      }
      .qty-num {
        min-width: 36px;
        text-align: center;
        font-size: 13px;
        font-weight: 600;
        padding: 0 6px;
        border-left: 1.5px solid var(--border);
        border-right: 1.5px solid var(--border);
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .action-link {
        font-size: 12px;
        color: var(--gray-2);
        cursor: pointer;
        background: none;
        border: none;
        font-family: var(--font);
        padding: 0;
        transition: color var(--trans);
      }
      .action-link:hover {
        color: var(--black);
        text-decoration: underline;
      }
      .action-sep {
        color: var(--gray-4);
        font-size: 12px;
      }
      .cart-item-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
        flex-shrink: 0;
        min-width: 90px;
      }
      .cart-item-price {
        font-size: 16px;
        font-weight: 700;
        color: var(--black);
      }
      .cart-item-original {
        font-size: 12px;
        color: var(--gray-3);
        text-decoration: line-through;
      }
      .cart-item-save {
        font-size: 11px;
        color: #c0392b;
        font-weight: 600;
      }
      .cart-item-freeship {
        font-size: 11px;
        color: #2e7d32;
        font-weight: 600;
      }

      /* SAVED FOR LATER */
      .saved-section {
        margin-top: 32px;
      }
      .saved-section h3 {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 16px;
        color: var(--black);
      }
      .saved-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
      }
      .saved-card {
        cursor: pointer;
        position: relative;
      }
      .saved-card-img {
        aspect-ratio: 1;
        border-radius: var(--radius-md);
        overflow: hidden;
        background: var(--gray-5);
        margin-bottom: 6px;
      }
      .saved-card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease;
      }
      .saved-card:hover .saved-card-img img {
        transform: scale(1.04);
      }
      .saved-card-price {
        font-size: 13px;
        font-weight: 700;
        color: var(--black);
      }
      .saved-card-title {
        font-size: 11px;
        color: var(--gray-2);
        margin-top: 2px;
      }
      .saved-card-btn {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        box-shadow: var(--shadow-sm);
        transition: all var(--trans);
      }
      .saved-card-btn:hover {
        background: #fff;
        transform: scale(1.1);
      }

      /* ORDER SUMMARY */
      .summary-box {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        position: sticky;
        top: calc(var(--nav-h)+16px);
      }
      .summary-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 20px;
      }
      .promo-row {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
      }
      .promo-input {
        flex: 1;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
        font-size: 13px;
        font-family: var(--font);
        outline: none;
        transition: border-color var(--trans);
      }
      .promo-input:focus {
        border-color: var(--black);
      }
      .promo-btn {
        padding: 10px 16px;
        background: var(--white);
        border: 1.5px solid var(--black);
        border-radius: var(--radius-sm);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        font-family: var(--font);
        transition: all var(--trans);
        white-space: nowrap;
      }
      .promo-btn:hover {
        background: var(--black);
        color: #fff;
      }
      .summary-lines {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
      }
      .summary-line {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: var(--gray-1);
      }
      .summary-line.total {
        font-size: 16px;
        font-weight: 700;
        color: var(--black);
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }
      .summary-line .discount {
        color: #c0392b;
        font-weight: 600;
      }
      .summary-line .free {
        color: #2e7d32;
        font-weight: 600;
      }
      .btn-checkout {
        width: 100%;
        padding: 15px;
        background: var(--orange);
        color: #fff;
        border: none;
        border-radius: var(--radius-full);
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        font-family: var(--font);
        transition: background var(--trans);
        margin-bottom: 12px;
      }
      .btn-checkout:hover {
        background: var(--orange-hover);
      }
      .btn-paypal {
        width: 100%;
        padding: 13px;
        background: #ffd140;
        color: #003087;
        border: none;
        border-radius: var(--radius-full);
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        font-family: var(--font);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-bottom: 16px;
        transition: filter var(--trans);
      }
      .btn-paypal:hover {
        filter: brightness(0.95);
      }
      .secure-note {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-size: 11px;
        color: var(--gray-3);
        margin-bottom: 16px;
      }
      .summary-divider {
        border: none;
        border-top: 1px solid var(--gray-5);
        margin: 16px 0;
      }
      .benefits-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .benefit-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        font-size: 12px;
        color: var(--gray-1);
      }
      .benefit-item svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        color: var(--gray-2);
        margin-top: 1px;
      }

      /* EMPTY CART */
      .empty-cart {
        text-align: center;
        padding: 80px 24px;
      }
      .empty-cart .icon {
        font-size: 64px;
        margin-bottom: 20px;
      }
      .empty-cart h2 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .empty-cart p {
        font-size: 14px;
        color: var(--gray-2);
        margin-bottom: 24px;
      }
      .btn-browse {
        padding: 13px 32px;
        background: var(--orange);
        color: #fff;
        border: none;
        border-radius: var(--radius-full);
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        font-family: var(--font);
        transition: background var(--trans);
      }
      .btn-browse:hover {
        background: var(--orange-hover);
      }

      /* RECENTLY VIEWED */
      .recently-section {
        margin-top: 40px;
      }
      .recently-section h3 {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 16px;
      }
      .recently-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 14px;
      }
      .recently-card {
        cursor: pointer;
      }
      .recently-img {
        aspect-ratio: 1;
        border-radius: var(--radius-md);
        overflow: hidden;
        background: var(--gray-5);
        margin-bottom: 8px;
      }
      .recently-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease;
      }
      .recently-card:hover .recently-img img {
        transform: scale(1.04);
      }
      .recently-price {
        font-size: 13px;
        font-weight: 700;
        color: var(--black);
      }
      .recently-title {
        font-size: 11px;
        color: var(--gray-2);
        margin-top: 2px;
      }

      /* BREADCRUMB */
      .breadcrumb {
        font-size: 12px;
        color: var(--gray-2);
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--gray-2);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
        color: var(--black);
      }

      /* TOAST */
      #toaster {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
      }
      .toast-msg {
        background: var(--black);
        color: #fff;
        padding: 10px 20px;
        border-radius: var(--radius-full);
        font-size: 13px;
        font-weight: 500;
        box-shadow: var(--shadow-lg);
        white-space: nowrap;
        animation: toastIn 0.2s ease;
      }
      .toast-msg.ok {
        background: #2e7d32;
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ANIM */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-in {
        animation: fadeUp 0.25s ease both;
      }

      @media (max-width: 640px) {
        .nav-search-wrap {
          display: none;
        }
        .cart-item {
          flex-wrap: wrap;
        }
        .cart-item-right {
          min-width: unset;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      Free local delivery on orders over KES 5,000 — <a href="#">Learn more</a>
    </div>

    <nav class="navbar">
      <div class="nav-main">
        <a href="index.html" class="nav-logo">SokoHub</a>
        <div class="nav-search-wrap">
          <input
            class="nav-search-input"
            type="text"
            placeholder="Search for anything"
            autocomplete="off"
            onkeydown="if (event.key === 'Enter') doSearch();"
          />
          <button class="nav-search-btn" onclick="doSearch()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            Search
          </button>
        </div>
        <div class="nav-links">
          <div
            class="nav-link"
            onclick="window.location.href = 'admin-login.html'"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            Sign in
          </div>
          <div
            class="nav-link"
            onclick="window.location.href = 'cart.html#saved'"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
              />
            </svg>
            Saved
          </div>
          <div
            class="nav-link nav-cart-badge"
            onclick="window.location.href = 'cart.html'"
          >
            <div style="position: relative">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <circle cx="9" cy="21" r="1" />
                <circle cx="20" cy="21" r="1" />
                <path
                  d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
                />
              </svg>
              <span
                style="
                  position: absolute;
                  top: -4px;
                  right: -4px;
                  background: var(--orange);
                  color: #fff;
                  font-size: 10px;
                  font-weight: 700;
                  border-radius: 50%;
                  width: 16px;
                  height: 16px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                "
                id="cartBadge"
                >0</span
              >
            </div>
            Cart
          </div>
          <!-- Sell button removed from navbar; moved to footer -->
        </div>
      </div>
    </nav>

    <div class="page-wrap">
      <div class="breadcrumb">
        <a href="listings.html">SokoHub</a>
        <span style="color: var(--gray-4)">›</span>
        <span>Your cart</span>
      </div>
      <h1 class="page-title" id="cartTitle">Your cart</h1>
      <div id="cartContent"></div>
    </div>

    <div id="toaster"></div>

    <script>
            // ─── DATA ────────────────────────────────────────────────────────────────────
            const LS_CART_KEY = "sokohub_cart";
            const LS_WISHLIST_KEY = "sokohub_wishlist";
            const LS_RECENT_KEY = "sokohub_recently_viewed";

            function getCart() {
              return JSON.parse(localStorage.getItem(LS_CART_KEY) || "[]");
            }
            function setCart(c) {
              localStorage.setItem(LS_CART_KEY, JSON.stringify(c));
            }
            function getWishlist() {
              return JSON.parse(localStorage.getItem(LS_WISHLIST_KEY) || "[]");
            }
            function setWishlist(w) {
              localStorage.setItem(LS_WISHLIST_KEY, JSON.stringify(w));
            }
            function getRecentlyViewed() {
              try {
                return JSON.parse(localStorage.getItem(LS_RECENT_KEY) || "[]");
              } catch (e) {
                return [];
              }
            }
            function setRecentlyViewed(items) {
              localStorage.setItem(LS_RECENT_KEY, JSON.stringify(items));
            }

            let cartItems = getCart();
            let wishlistItems = getWishlist();

            // Recently viewed products are stored in localStorage by the listing detail page.

            let promoApplied = false;

            const fmt = (n) =>
              n
                ? new Intl.NumberFormat("en-KE", {
                    style: "currency",
                    currency: "KES",
                    maximumFractionDigits: 0,
                  }).format(n)
                : "Free";

            function getSubtotal() {
              return cartItems.reduce((s, i) => s + i.price * i.qty, 0);
            }
            function getSavings() {
              return cartItems.reduce(
                (s, i) =>
                  s + (i.originalPrice ? (i.originalPrice - i.price) * i.qty : 0),
                0,
              );
            }
            function getShipping() {
              return cartItems.some((i) => i.freeShip && getSubtotal() >= 5000)
                ? 0
                : cartItems.length
                  ? 250
                  : 0;
            }
            function getTotal() {
              const promo = promoApplied ? Math.round(getSubtotal() * 0.1) : 0;
              return getSubtotal() + getShipping() - promo;
            }

            // Group items by shop
            function groupByShop() {
              const m = {};
              cartItems.forEach((i) => {
                if (!m[i.shop]) {
                  // Use generic avatar if none provided in cart item
                  const avatar =
                    i.shopAvatar ||
                    `https://ui-avatars.com/api/?name=${encodeURIComponent(i.shop)}&background=E8600A&color=fff&size=60`;
                  m[i.shop] = { shop: i.shop, avatar: avatar, items: [] };
                }
                m[i.shop].items.push(i);
              });
              return Object.values(m);
            }

            function render() {
              document.getElementById("cartBadge").textContent = cartItems.reduce(
                (s, i) => s + i.qty,
                0,
              );
              const el = document.getElementById("cartContent");

              if (!cartItems.length) {
                document.getElementById("cartTitle").textContent =
                  "Your cart (0 items)";
                el.innerHTML = `
            <div class="empty-cart fade-in">
              <div class="icon">🛒</div>
              <h2>Your cart is empty</h2>
              <p>Looks like you haven't added anything yet. Start exploring!</p>
              <button class="btn-browse" onclick="window.location.href='listings.html'">Browse listings</button>
            </div>
            ${renderRecentlyViewed()}
          `;
                return;
              }

              document.getElementById("cartTitle").textContent =
                `Your cart (${cartItems.reduce((s, i) => s + i.qty, 0)} item${cartItems.reduce((s, i) => s + i.qty, 0) !== 1 ? "s" : ""})`;
              const groups = groupByShop();
              const sub = getSubtotal();
              const savings = getSavings();
              const ship = getShipping();
              const promo = promoApplied ? Math.round(sub * 0.1) : 0;
              const total = getTotal();

              el.innerHTML = `
          <div class="cart-layout fade-in">
            <div>
              ${groups.map((g) => shopGroupHTML(g)).join("")}
              ${renderSavedForLater()}
              ${renderRecentlyViewed()}
            </div>
      <div>
              <div class="summary-box">
                <div class="summary-title">Order summary</div>
                <div class="promo-row">
                  <input class="promo-input" type="text" id="promoInput" placeholder="Add coupon code" value="${promoApplied ? "SOKO10" : ""}" />
                  <button class="promo-btn" onclick="applyPromo()">${promoApplied ? "Remove" : "Apply"}</button>
                </div>
                <div class="summary-lines">
                  <div class="summary-line"><span>Subtotal (${cartItems.reduce((s, i) => s + i.qty, 0)} items)</span><span>${fmt(sub)}</span></div>
                  ${savings ? `<div class="summary-line"><span>You save</span><span class="discount">-${fmt(savings)}</span></div>` : ""}
                  <div class="summary-line"><span>Shipping</span><span class="${ship === 0 ? "free" : ""}">${ship === 0 ? "FREE" : fmt(ship)}</span></div>
                  ${promoApplied ? `<div class="summary-line"><span>Coupon (SOKO10)</span><span class="discount">-${fmt(promo)}</span></div>` : ""}
                  <div class="summary-line total"><span>Total</span><span>${fmt(total)}</span></div>
                </div>
                <button class="btn-checkout" onclick="window.location.href='checkout.html'">Proceed to checkout</button>
                <button class="btn-paypal">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="4" fill="#003087"/><text x="4" y="16" font-size="10" fill="#FFD140" font-weight="700">PP</text></svg>
                  Pay with PayPal
                </button>
                <div class="secure-note">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                  Secure checkout · SSL encrypted
                </div>
                <hr class="summary-divider" />
                <div class="benefits-list">
                  <div class="benefit-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    <span><strong>Buyer Protection</strong> — Payment held until you confirm receipt</span>
                  </div>
                  <div class="benefit-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h5l3 5v4h-8V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                    <span>Free delivery on orders over <strong>KES 5,000</strong></span>
                  </div>
                  <div class="benefit-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span>Safe meetup spots available across Nairobi</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
            }

            function shopGroupHTML(g) {
              return `
          <div class="shop-group">
            <div class="shop-group-header">
              <div class="shop-group-avatar"><img src="${g.avatar}" alt="${g.shop}" /></div>
              <div class="shop-group-name">Shop: <a href="#">${g.shop}</a></div>
            </div>
            ${g.items.map((i) => cartItemHTML(i)).join("")}
          </div>`;
            }

            function cartItemHTML(item) {
              const pct = item.originalPrice
                ? Math.round((1 - item.price / item.originalPrice) * 100)
                : 0;
              return `
          <div class="cart-item" id="item-${item.id}">
            <div class="cart-item-img" onclick="window.location.href='listing-detail.html?id=${item.id}'">
              <img src="${item.image}" alt="${item.title}" loading="lazy" />
            </div>
            <div class="cart-item-body">
              <div class="cart-item-title" onclick="window.location.href='listing-detail.html?id=${item.id}'">${item.title}</div>
              <div class="cart-item-shop">${item.shop}</div>
              <div class="cart-item-meta">
                <span class="meta-pill">${item.condition}</span>
                ${item.freeShip ? '<span class="meta-pill" style="background:#e8f5e9;color:#2e7d32">Free delivery</span>' : ""}
                ${item.onSale ? `<span class="meta-pill" style="background:#fdecea;color:#c0392b">-${pct}% OFF</span>` : ""}
              </div>
              <div class="cart-item-actions">
                <div class="qty-ctrl">
                  <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
                  <div class="qty-num">${item.qty}</div>
                  <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
                </div>
                <span class="action-sep">|</span>
                <button class="action-link" onclick="saveForLater('${item.id}')">Save for later</button>
                <span class="action-sep">|</span>
                <button class="action-link" onclick="removeItem('${item.id}')">Remove</button>
              </div>
            </div>
            <div class="cart-item-right">
              <div class="cart-item-price">${fmt(item.price * item.qty)}</div>
              ${item.originalPrice ? `<div class="cart-item-original">${fmt(item.originalPrice * item.qty)}</div>` : ""}
              ${pct ? `<div class="cart-item-save">Save ${pct}%</div>` : ""}
              ${item.freeShip ? `<div class="cart-item-freeship">FREE delivery</div>` : ""}
            </div>
          </div>`;
            }

            function renderSavedForLater() {
              if (!wishlistItems.length) return "";
              return `
          <div class="saved-section" id="savedSection">
            <h3>Saved for later (${wishlistItems.length})</h3>
            <div class="saved-grid">
              ${wishlistItems
                .map(
                  (s) => `
                <div class="saved-card" onclick="window.location.href='listing-detail.html?id=${s.id}'">
                  <div class="saved-card-img"><img src="${s.image}" alt="${s.title}" loading="lazy" /></div>
                  <button class="saved-card-btn" onclick="event.stopPropagation();moveToCart('${s.id}')" title="Move to cart">🛒</button>
                  <div class="saved-card-price">${fmt(s.price)}</div>
                  <div class="saved-card-title">${s.title.substring(0, 32)}…</div>
                </div>`,
                )
                .join("")}
            </div>
          </div>`;
            }

            function renderRecentlyViewed() {
              const recent = getRecentlyViewed();
              if (!recent.length) return "";
              return `
          <div class="recently-section">
            <h3>Recently viewed</h3>
            <div class="recently-grid">
              ${recent
                .map(
                  (r) => `
                <div class="recently-card" onclick="window.location.href='listing-detail.html?id=${r.id}'">
                  <div class="recently-img"><img src="${r.image}" alt="${r.title}" loading="lazy" /></div>
                  <div class="recently-price">${fmt(r.price)}</div>
                  <div class="recently-title">${r.title.substring(0, 30)}…</div>
                </div>`,
                )
                .join("")}
            </div>
          </div>`;
            }

            // ACTIONS
            function changeQty(id, d) {
              const item = cartItems.find((i) => i.id === id);
              if (!item) return;
              item.qty = Math.max(1, Math.min(10, item.qty + d));
              setCart(cartItems);
              render();
            }
            function removeItem(id) {
              cartItems = cartItems.filter((i) => i.id !== id);
              setCart(cartItems);
              showToast("Item removed from cart");
              render();
            }
            function saveForLater(id) {
              const item = cartItems.find((i) => i.id === id);
              if (item) {
                wishlistItems.push(item);
                setWishlist(wishlistItems);
                removeItem(id);
              }
              showToast("Saved for later ❤️", "ok");
              render();
            }
            function moveToCart(id) {
              const item = wishlistItems.find((i) => i.id === id);
              if (!item) {
                showToast("Moved to cart 🛒", "ok");
                return;
              }

              // If the item already exists in the cart, increase qty instead of adding a new line.
              const existing = cartItems.find((i) => i.id === id);
              if (existing) {
                existing.qty = Math.max(1, Math.min(10, existing.qty + 1));
              } else {
                cartItems.push({ ...item, qty: 1 });
              }

              setCart(cartItems);
              wishlistItems = wishlistItems.filter((i) => i.id !== id);
              setWishlist(wishlistItems);

              showToast("Moved to cart 🛒", "ok");
              render();
            }

            function applyPromo() {
              const val = document
                .getElementById("promoInput")
                ?.value?.trim()
                .toUpperCase();
              if (promoApplied) {
                promoApplied = false;
                showToast("Coupon removed");
                render();
                return;
              }
              if (val === "SOKO10") {
                promoApplied = true;
                showToast("10% coupon applied! 🎉", "ok");
                render();
              } else showToast("Invalid coupon code");
            }

            function showToast(msg, type = "") {
              const t = document.createElement("div");
              t.className = `toast-msg ${type}`;
              t.textContent = msg;
              document.getElementById("toaster").appendChild(t);
              setTimeout(() => t.remove(), 2600);
            }

            function doSearch() {
              const query = document.querySelector('.nav-search-input')?.value?.trim();
              if (query) {
                window.location.href = `listings.html?q=${encodeURIComponent(query)}`;
              }
            }

            window.addEventListener("scroll", () => {
              document.querySelector(".navbar").style.boxShadow =
                window.scrollY > 4 ? "0 2px 8px rgba(0,0,0,.1)" : "";
            });

            render();
    </script>
    <script>
      function updateHeaderCounts() {
        try {
          const cart = JSON.parse(localStorage.getItem("sokohub_cart") || "[]");
          const qty = cart.reduce((s, i) => s + (i.qty || 1), 0);
          document
            .querySelectorAll(".cart-count")
            .forEach((el) => (el.textContent = qty));
          const badge = document.getElementById("cartBadge");
          if (badge) badge.textContent = qty;
        } catch (e) {}
      }
      document.addEventListener("DOMContentLoaded", updateHeaderCounts);
      window.addEventListener("storage", updateHeaderCounts);
      updateHeaderCounts();
    </script>
  </body>
</html>
